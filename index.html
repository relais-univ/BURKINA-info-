<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BURKINA INFO – Direct</title>
    <meta name="theme-color" content="#001F9F">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F7FA; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo span { display: inline-block; padding: 8px 16px; font-size: 28px; font-weight: 800; }
        .logo .burkina { background: #001F9F; color: white; border-radius: 12px 0 0 12px; }
        .logo .info { background: #BA0C0D; color: white; border-radius: 0 12px 12px 0; }
        .slogan { text-align: center; font-size: 14px; color: #6B7280; margin-bottom: 20px; }
        .player-card { background: black; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn { display: block; width: 100%; background: #001F9F; color: white; border: none; padding: 12px; border-radius: 40px; font-size: 16px; font-weight: 600; margin-bottom: 20px; cursor: pointer; }
        .info { background: white; border-radius: 16px; padding: 16px; text-align: center; border: 1px solid #E5E7EB; }
        .footer { text-align: center; font-size: 12px; color: #9CA3AF; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="burkina">BURKINA</span><span class="info">INFO</span>
        </div>
        <div class="slogan" id="slogan">L'information en continu, proche de vous</div>

        <div class="player-card">
            <video id="videoPlayer" controls playsinline>
                <source src="" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <button class="btn" id="playBtn">▶ REGARDER LE DIRECT</button>

        <div class="info">
            📡 <span id="canal">Canal+ n°5</span> &nbsp;|&nbsp;
            📺 <span id="tnt">TNT n°21</span><br>
            <a href="#" id="whatsappLink" style="display: inline-block; margin-top: 10px; background: #25D366; color: white; padding: 6px 12px; border-radius: 40px; text-decoration: none;">💬 WhatsApp</a>
        </div>
        <div class="footer">BURKINA INFO – La chaîne de tous les Burkinabè</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZfGl9pNalTOr7E7D724VrhRwfYyWgiJQ",
            authDomain: "burkina-infos.firebaseapp.com",
            projectId: "burkina-infos",
            storageBucket: "burkina-infos.firebasestorage.app",
            messagingSenderId: "951195759324",
            appId: "1:951195759324:web:f3b49cbba67e4f15a1fa19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const video = document.getElementById('videoPlayer');
        const source = video.querySelector('source');

        function normaliserNumero(num) {
            let chiffres = (num || "25 40 86 85").replace(/\D/g, '');
            if (!chiffres.startsWith("226")) chiffres = "226" + chiffres;
            return chiffres;
        }

        onSnapshot(doc(db, "config", "site"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                // Mettre à jour le slogan
                if (data.slogan) document.getElementById('slogan').innerText = data.slogan;
                // Mettre à jour les infos de réception
                if (data.siteInfos) {
                    document.getElementById('canal').innerText = data.siteInfos.canal || "Canal+ n°5";
                    document.getElementById('tnt').innerText = data.siteInfos.tnt || "TNT n°21";
                    const whatsappNum = normaliserNumero(data.siteInfos.whatsapp);
                    document.getElementById('whatsappLink').href = `https://wa.me/${whatsappNum}?text=Bonjour%20BURKINA%20INFO`;
                    document.getElementById('whatsappLink').innerHTML = `💬 WhatsApp ${data.siteInfos.whatsapp || "25 40 86 85"}`;
                }
                // Précharger le lien direct s'il existe
                if (data.directUrl && data.directUrl.trim() !== "") {
                    source.src = data.directUrl;
                    video.load();
                    console.log("Lien direct chargé :", data.directUrl);
                } else {
                    console.warn("Aucun lien direct trouvé dans Firebase");
                }
            } else {
                console.log("Document Firebase inexistant, utilisez l'admin pour créer");
            }
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (source.src && source.src !== window.location.href) {
                video.play().catch(e => alert("Impossible de lire la vidéo. Vérifiez le lien dans l'admin."));
            } else {
                alert("Aucune vidéo configurée. Veuillez ajouter un lien dans l'administration.");
            }
        });
    </script>
</body>
      </html>
